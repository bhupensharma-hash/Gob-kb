id: "diagnostics.transfer_issue"
name: "Transfer Issue Diagnostic"
description: "Identifies SKUs where backend warehouse has stock but front-end stores don't."
type: diagnostic
parent: null
related:
  - id: "metrics.osa"
    relation: cross_check
    label: "Low frontend OSA is the symptom"
  - id: "metrics.psl"
    relation: feeds_into
    label: "PSL quantifies the revenue impact of unresolved transfer issues"
  - id: "domains.supply_chain.transfer_issues"
    relation: composes
    label: "This diagnostic underpins the transfer_issues topic"
primitives: [availability]
common_questions:
  - "Why is stock stuck in the warehouse?"
  - "Backend DOI is high but frontend OSA is low — why?"
planner_hint: >-
  Use when the user wants to determine whether low frontend availability
  is caused by inventory failing to transfer from backend warehouse to dark stores.
expose_to_planner: true

# Diagnostic-specific: the SQL fragment that identifies the pattern.
sql: |
  SELECT
    facility_id,
    product_id,
    backend_doi,
    osa_listing,
    psl_mrp_listed
  FROM {platform}_facility_doi_metrics
  WHERE backend_doi > LEAST(5, doi_th * 0.75)
    AND osa_listing < 70
    AND psl_mrp_listed > 0
  ORDER BY psl_mrp_listed DESC;
