id: "playbooks.availability_diagnosis"
name: "Availability Diagnosis Playbook"
description: "Decision tree for diagnosing OSA drops — splits listing vs inventory, then routes to root cause."
type: playbook
parent: null
related:
  - id: "metrics.osa"
    relation: composes
    label: "Playbook operates on OSA values"
  - id: "metrics.psl"
    relation: composes
    label: "Playbook quantifies impact via PSL"
  - id: "diagnostics.transfer_issue"
    relation: composes
    label: "One of the leaf cases this playbook routes to"
primitives: [availability]
common_questions:
  - "Why did my OSA drop?"
  - "What is causing my availability problem?"
  - "Why is my product out of stock?"
planner_hint: >-
  Use when the user reports an OSA drop or asks for a root-cause walkthrough
  of an availability problem. The playbook sequences the diagnosis end-to-end.
expose_to_planner: true

# Playbook-specific: the typed traversal.
# Each step references atoms by ID. The chat assembler executes one step per
# turn; the report assembler walks all steps in sequence.
traversal:
  - step: render
    ref: metrics.osa
    note: "Restate what OSA is and which formula was applied."

  - step: fetch_data
    action: "Compute OSA delta and DS_listing delta over the period."
    note: "Symptom quantification."

  - step: branch
    condition: "DS_listing dropped > 10%"
    if_true:
      - step: call_playbook
        ref: playbooks.availability_diagnosis_listing_branch
        note: "Listing issue — go to Case 1 sub-tree (placeholder)"
    if_false:
      - step: run_diagnostic
        ref: diagnostics.transfer_issue
        note: "Inventory branch — first check transfer issue"
      - step: branch
        condition: "transfer issue detected"
        if_true:
          - step: render
            ref: diagnostics.transfer_issue
        if_false:
          - step: render
            ref: metrics.psl
            note: "PSL but no transfer issue — likely PO or fill rate problem (next phase to be added)"

  # Walk the causal chain from OSA to PSL — quantifies recovery opportunity.
  # When more metric_relationship atoms exist (e.g. psl_drives_share_loss),
  # change `to:` to metrics.market_share to walk the full chain.
  - step: traverse_causes
    from: metrics.osa
    to: metrics.psl
    render_each_link: true

  - step: terminate
    verdict_template: "Availability {direction} by {delta_pp}pp; root cause: {root_cause}; owner: {owner}."
