name: Validate Knowledge Graph

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run schema validators
        run: pytest tests/test_schema.py -v

      - name: Run reference checks
        run: pytest tests/test_references.py -v

      - name: Run traversal checks
        run: pytest tests/test_traversals.py -v

      - name: Run all tests with coverage
        run: pytest --cov=gobiq_knowledge --cov-report=term-missing
